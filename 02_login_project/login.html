<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin:0;
            padding:0;
            height:100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: #e4c4c4;
            border-radius: 8px;
            padding: 30px;
            width: 200px;
        }
        h2 {
            color :#801c78;
            text-align:center;
            margin-bottom: 30px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border:1px solid black;
            background-color: #e0aaaa;
        }
        button {
            background-color: rgb(154, 154, 238);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
        }
        button:hover {
            background-color: pink;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
